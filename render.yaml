services:
  - type: web
    name: medical-imaging-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        value: localhost
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        value: imagingdb
      - key: DB_USER
        value: postgres
      - key: DB_PASSWORD
        value: your_postgresql_password
      - key: JWT_SECRET
        value: your_super_secret_jwt_key_here_change_in_production
      - key: FRONTEND_URL
        value: https://your-app-name.onrender.com
